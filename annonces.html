<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annonces — ImmoRDC</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh; }
    nav { display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0a0a0aee;backdrop-filter:blur(10px);z-index:100; }
    nav a.logo { color:#fff;text-decoration:none;font-weight:600;font-size:18px; }
    nav a.logo span { color:#00c853; }
    nav .nav-links { display:flex;gap:16px;align-items:center; }
    nav .nav-links a { color:#888;text-decoration:none;font-size:14px;transition:color .2s; }
    nav .nav-links a:hover { color:#fff; }
    nav .nav-links a.btn { background:#00c853;color:#000;padding:8px 16px;border-radius:8px;font-weight:600; }
    .hero { padding:60px 40px 40px;max-width:1200px;margin:0 auto; }
    .hero h1 { font-size:36px;font-weight:700;margin-bottom:8px; }
    .hero h1 span { color:#00c853; }
    .hero p { color:#888;font-size:16px; }
    .filters { background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:20px;margin:0 40px 32px;max-width:1120px;margin-left:auto;margin-right:auto; }
    .filters-grid { display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;align-items:end; }
    .filter-field { display:flex;flex-direction:column;gap:6px; }
    .filter-field label { font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.05em; }
    .filter-field input, .filter-field select { background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px 12px;font-size:14px;color:#fff;outline:none;width:100%; }
    .filter-field input:focus, .filter-field select:focus { border-color:#00c853; }
    select option { background:#111; }
    .filter-btn { background:#00c853;color:#000;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s; }
    .filter-btn:hover { background:#00e676; }
    .reset-btn { background:transparent;color:#888;border:1px solid #333;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;margin-left:8px;transition:all .2s; }
    .reset-btn:hover { color:#fff;border-color:#555; }
    .results-bar { display:flex;align-items:center;justify-content:space-between;padding:0 40px;max-width:1200px;margin:0 auto 20px; }
    .results-count { font-size:14px;color:#888; }
    .results-count strong { color:#fff; }
    .sort-select { background:#111;border:1px solid #222;border-radius:8px;padding:8px 12px;font-size:13px;color:#fff;outline:none; }
    .grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:0 40px;max-width:1200px;margin:0 auto; }
    .card { background:#111;border:1px solid #1a1a1a;border-radius:16px;overflow:hidden;transition:transform .2s,border-color .2s;cursor:pointer; }
    .card:hover { transform:translateY(-4px);border-color:#333; }
    .card-img { width:100%;height:200px;object-fit:cover;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#333;font-size:40px; }
    .card-img img { width:100%;height:100%;object-fit:cover; }
    .card-body { padding:16px; }
    .card-badges { display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap; }
    .card-badge { font-size:10px;padding:3px 8px;border-radius:99px;font-weight:500; }
    .badge-type { background:#1a1a2e;color:#7986cb; }
    .badge-meuble { background:#0d1f12;color:#00c853; }
    .badge-new { background:#1f1200;color:#ffb300; }
    .card-title { font-size:16px;font-weight:600;margin-bottom:6px;line-height:1.3; }
    .card-location { font-size:13px;color:#888;margin-bottom:12px;display:flex;align-items:center;gap:4px; }
    .card-price { font-size:22px;font-weight:700;color:#00c853;margin-bottom:12px; }
    .card-price span { font-size:13px;color:#888;font-weight:400; }
    .card-details { display:flex;gap:12px;font-size:12px;color:#666;border-top:1px solid #1a1a1a;padding-top:12px; }
    .card-detail { display:flex;align-items:center;gap:4px; }
    .load-more { display:block;margin:40px auto;padding:14px 32px;background:transparent;border:1px solid #333;border-radius:10px;color:#888;font-size:14px;cursor:pointer;transition:all .2s; }
    .load-more:hover { border-color:#00c853;color:#00c853; }
    .empty { text-align:center;padding:80px 20px;color:#444; }
    .empty-icon { font-size:48px;margin-bottom:16px; }
    .empty-text { font-size:18px;color:#666;margin-bottom:8px; }
    .empty-sub { font-size:14px; }
    .skeleton { animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    .skel-card { background:#111;border:1px solid #1a1a1a;border-radius:16px;overflow:hidden; }
    .skel-img { height:200px;background:#1a1a1a; }
    .skel-body { padding:16px; }
    .skel-line { height:12px;background:#1a1a1a;border-radius:6px;margin-bottom:10px; }
    .modal { display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;overflow-y:auto;padding:20px; }
    .modal.active { display:flex;align-items:flex-start;justify-content:center; }
    .modal-box { background:#111;border:1px solid #222;border-radius:20px;max-width:720px;width:100%;margin:auto;overflow:hidden; }
    .modal-gallery { position:relative;height:320px;background:#0a0a0a;overflow:hidden; }
    .modal-gallery img { width:100%;height:100%;object-fit:cover; }
    .modal-gallery .no-photo { display:flex;align-items:center;justify-content:center;height:100%;font-size:60px;color:#222; }
    .gallery-nav { position:absolute;bottom:12px;right:12px;display:flex;gap:6px; }
    .gallery-btn { background:rgba(0,0,0,.7);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center; }
    .gallery-count { position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;padding:4px 10px;border-radius:99px; }
    .modal-body { padding:24px; }
    .modal-title { font-size:22px;font-weight:700;margin-bottom:8px; }
    .modal-price { font-size:28px;font-weight:700;color:#00c853;margin-bottom:16px; }
    .modal-price span { font-size:14px;color:#888;font-weight:400; }
    .modal-details { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px; }
    .modal-detail { background:#0a0a0a;border-radius:10px;padding:12px;text-align:center; }
    .modal-detail-val { font-size:18px;font-weight:600; }
    .modal-detail-lbl { font-size:11px;color:#666;margin-top:2px; }
    .modal-desc { font-size:14px;color:#888;line-height:1.7;margin-bottom:20px; }
    .modal-contact { background:#0d1f12;border:1px solid #1D9E75;border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between; }
    .modal-contact-info { font-size:14px;color:#888; }
    .modal-contact-info strong { display:block;font-size:16px;color:#fff;margin-bottom:2px; }
    .whatsapp-btn { background:#25D366;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block; }
    .modal-close { position:absolute;top:16px;right:16px;background:rgba(0,0,0,.7);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:10; }
    .modal-gallery { position:relative; }
    footer { border-top:1px solid #1a1a1a;padding:32px 40px;text-align:center;color:#444;font-size:13px;margin-top:60px; }
    @media(max-width:768px) {
      nav { padding:16px 20px; }
      .hero { padding:40px 20px 20px; }
      .hero h1 { font-size:26px; }
      .filters { margin:0 20px 24px;padding:16px; }
      .filters-grid { grid-template-columns:1fr 1fr;gap:10px; }
      .filters-grid .filter-btn { grid-column:1/-1; }
      .grid { grid-template-columns:1fr;padding:0 20px; }
      .results-bar { padding:0 20px; }
      .modal-details { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo"><span>Immo</span>RDC</a>
  <div class="nav-links">
    <a href="/annonces.html">Annonces</a>
    <a href="/publier.html" class="btn">+ Publier</a>
  </div>
</nav>

<div class="hero">
  <h1>Logements disponibles <span>à Kinshasa</span></h1>
  <p id="hero-sub">Chargement des annonces...</p>
</div>

<div class="filters">
  <div class="filters-grid">
    <div class="filter-field">
      <label>Recherche</label>
      <input type="text" id="f-search" placeholder="Commune, quartier, description...">
    </div>
    <div class="filter-field">
      <label>Type de bien</label>
      <select id="f-type">
        <option value="">Tous les types</option>
        <option value="appartement">Appartement</option>
        <option value="maison">Maison</option>
        <option value="villa">Villa</option>
        <option value="studio">Studio</option>
        <option value="chambre">Chambre</option>
      </select>
    </div>
    <div class="filter-field">
      <label>Commune</label>
      <select id="f-commune">
        <option value="">Toutes</option>
        <option value="Gombe">Gombe</option>
        <option value="Ngaliema">Ngaliema</option>
        <option value="Limete">Limete</option>
        <option value="Lemba">Lemba</option>
        <option value="Kintambo">Kintambo</option>
        <option value="Bandalungwa">Bandalungwa</option>
        <option value="Matete">Matete</option>
        <option value="Kalamu">Kalamu</option>
      </select>
    </div>
    <div class="filter-field">
      <label>Budget max (USD)</label>
      <input type="number" id="f-budget" placeholder="Ex: 800">
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <button class="filter-btn" onclick="appliquerFiltres()">🔍 Chercher</button>
      <button class="reset-btn" onclick="resetFiltres()">✕</button>
    </div>
  </div>
</div>

<div class="results-bar">
  <div class="results-count" id="results-count">Chargement...</div>
  <select class="sort-select" id="sort" onchange="appliquerFiltres()">
    <option value="recent">Plus récents</option>
    <option value="prix-asc">Prix croissant</option>
    <option value="prix-desc">Prix décroissant</option>
  </select>
</div>

<div class="grid" id="annonces-grid">
  <!-- Skeletons -->
  <div class="skel-card skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:40%"></div><div class="skel-line" style="width:80%"></div></div></div>
  <div class="skel-card skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:40%"></div><div class="skel-line" style="width:80%"></div></div></div>
  <div class="skel-card skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:40%"></div><div class="skel-line" style="width:80%"></div></div></div>
</div>

<button class="load-more" id="load-more" onclick="chargerPlus()" style="display:none">Voir plus d'annonces</button>

<!-- Modal détail -->
<div class="modal" id="modal" onclick="fermerModal(event)">
  <div class="modal-box">
    <div class="modal-gallery" id="modal-gallery">
      <button class="modal-close" onclick="fermerModal()">✕</button>
      <div class="no-photo" id="modal-no-photo">🏠</div>
      <img id="modal-img" style="display:none" alt="Photo du bien">
      <div class="gallery-count" id="gallery-count" style="display:none"></div>
      <div class="gallery-nav" id="gallery-nav" style="display:none">
        <button class="gallery-btn" onclick="prevPhoto(event)">‹</button>
        <button class="gallery-btn" onclick="nextPhoto(event)">›</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="card-badges" id="modal-badges"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-details" id="modal-details"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-contact" id="modal-contact"></div>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 ImmoRDC · <a href="/" style="color:#00c853;text-decoration:none">Retour à l'accueil</a> · <a href="/publier.html" style="color:#00c853;text-decoration:none">Publier un bien</a></p>
</footer>

<script>
  const API = 'https://api-immo-rdc.onrender.com'
  let tousLesBiens = []
  let biensFiltres = []
  let pageActuelle = 1
  const PAR_PAGE = 9
  let photosActuelles = []
  let photoIndex = 0

  async function chargerAnnonces() {
    try {
      const res = await fetch(API + '/v1/listings?page=1')
      const data = await res.json()
      tousLesBiens = data.biens || []
      biensFiltres = [...tousLesBiens]
      afficher()
      document.getElementById('hero-sub').textContent =
        `${tousLesBiens.length} logement${tousLesBiens.length > 1 ? 's' : ''} disponible${tousLesBiens.length > 1 ? 's' : ''} à Kinshasa et environs`
    } catch(e) {
      document.getElementById('annonces-grid').innerHTML =
        '<div class="empty"><div class="empty-icon">😕</div><div class="empty-text">Erreur de chargement</div><div class="empty-sub">Vérifiez votre connexion et rechargez la page</div></div>'
    }
  }

  function appliquerFiltres() {
    const search = document.getElementById('f-search').value.toLowerCase()
    const type = document.getElementById('f-type').value
    const commune = document.getElementById('f-commune').value
    const budget = parseInt(document.getElementById('f-budget').value) || 999999
    const sort = document.getElementById('sort').value

    biensFiltres = tousLesBiens.filter(b => {
      const matchSearch = !search ||
        b.titre?.toLowerCase().includes(search) ||
        b.commune?.toLowerCase().includes(search) ||
        b.quartier?.toLowerCase().includes(search) ||
        b.description?.toLowerCase().includes(search)
      const matchType = !type || b.type_bien === type
      const matchCommune = !commune || b.commune === commune
      const matchBudget = b.loyer_usd <= budget
      return matchSearch && matchType && matchCommune && matchBudget
    })

    if (sort === 'prix-asc') biensFiltres.sort((a,b) => a.loyer_usd - b.loyer_usd)
    else if (sort === 'prix-desc') biensFiltres.sort((a,b) => b.loyer_usd - a.loyer_usd)

    pageActuelle = 1
    afficher()
  }

  function resetFiltres() {
    document.getElementById('f-search').value = ''
    document.getElementById('f-type').value = ''
    document.getElementById('f-commune').value = ''
    document.getElementById('f-budget').value = ''
    document.getElementById('sort').value = 'recent'
    biensFiltres = [...tousLesBiens]
    pageActuelle = 1
    afficher()
  }

  function afficher() {
    const grid = document.getElementById('annonces-grid')
    const visible = biensFiltres.slice(0, pageActuelle * PAR_PAGE)
    const count = document.getElementById('results-count')

    count.innerHTML = `<strong>${biensFiltres.length}</strong> annonce${biensFiltres.length > 1 ? 's' : ''} trouvée${biensFiltres.length > 1 ? 's' : ''}`

    if (biensFiltres.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">Aucun bien trouvé</div>
        <div class="empty-sub">Essayez d'élargir vos critères de recherche</div>
      </div>`
      document.getElementById('load-more').style.display = 'none'
      return
    }

    grid.innerHTML = visible.map(b => carteHTML(b)).join('')
    document.getElementById('load-more').style.display =
      biensFiltres.length > pageActuelle * PAR_PAGE ? 'block' : 'none'
  }

  function carteHTML(b) {
    const photos = b.photos && b.photos.length > 0 ? b.photos : []
    const photo = photos[0]
    const isNew = new Date() - new Date(b.created_at) < 7 * 24 * 60 * 60 * 1000

    return `<div class="card" onclick='ouvrirModal(${JSON.stringify(b)})'>
      <div class="card-img">
        ${photo
          ? `<img src="${photo}" alt="${b.titre}" loading="lazy">`
          : '🏠'}
      </div>
      <div class="card-body">
        <div class="card-badges">
          <span class="card-badge badge-type">${capitalise(b.type_bien)}</span>
          ${b.meuble ? '<span class="card-badge badge-meuble">Meublé</span>' : ''}
          ${isNew ? '<span class="card-badge badge-new">Nouveau</span>' : ''}
        </div>
        <div class="card-title">${b.titre}</div>
        <div class="card-location">📍 ${b.commune}${b.quartier ? ' · ' + b.quartier : ''}</div>
        <div class="card-price">$${b.loyer_usd.toLocaleString()} <span>/ mois</span></div>
        <div class="card-details">
          ${b.chambres ? `<div class="card-detail">🛏 ${b.chambres} ch.</div>` : ''}
          ${b.surface_m2 ? `<div class="card-detail">📐 ${b.surface_m2} m²</div>` : ''}
          <div class="card-detail">👁 ${b.vues || 0} vues</div>
        </div>
      </div>
    </div>`
  }

  function ouvrirModal(b) {
    photosActuelles = b.photos && b.photos.length > 0 ? b.photos : []
    photoIndex = 0
    majPhoto()

    document.getElementById('modal-badges').innerHTML = `
      <span class="card-badge badge-type">${capitalise(b.type_bien)}</span>
      ${b.meuble ? '<span class="card-badge badge-meuble">Meublé</span>' : ''}
    `
    document.getElementById('modal-title').textContent = b.titre
    document.getElementById('modal-price').innerHTML = `$${b.loyer_usd.toLocaleString()} <span>/ mois</span>`
    document.getElementById('modal-details').innerHTML = `
      ${b.chambres ? `<div class="modal-detail"><div class="modal-detail-val">🛏 ${b.chambres}</div><div class="modal-detail-lbl">Chambres</div></div>` : ''}
      ${b.surface_m2 ? `<div class="modal-detail"><div class="modal-detail-val">📐 ${b.surface_m2}</div><div class="modal-detail-lbl">m²</div></div>` : ''}
      <div class="modal-detail"><div class="modal-detail-val">📍</div><div class="modal-detail-lbl">${b.commune}${b.quartier ? ' · ' + b.quartier : ''}</div></div>
    `
    document.getElementById('modal-desc').textContent = b.description || 'Aucune description fournie.'
    document.getElementById('modal-contact').innerHTML = `
      <div class="modal-contact-info">
        <strong>Contacter le propriétaire</strong>
        ${b.telephone}
      </div>
      <a class="whatsapp-btn" href="https://wa.me/${b.telephone.replace(/[^0-9]/g,'')}" target="_blank">
        💬 WhatsApp
      </a>
    `
    document.getElementById('modal').classList.add('active')
    document.body.style.overflow = 'hidden'
  }

  function majPhoto() {
    const img = document.getElementById('modal-img')
    const noPhoto = document.getElementById('modal-no-photo')
    const count = document.getElementById('gallery-count')
    const nav = document.getElementById('gallery-nav')

    if (photosActuelles.length > 0) {
      img.src = photosActuelles[photoIndex]
      img.style.display = 'block'
      noPhoto.style.display = 'none'
      if (photosActuelles.length > 1) {
        count.textContent = `${photoIndex + 1} / ${photosActuelles.length}`
        count.style.display = 'block'
        nav.style.display = 'flex'
      }
    } else {
      img.style.display = 'none'
      noPhoto.style.display = 'flex'
      count.style.display = 'none'
      nav.style.display = 'none'
    }
  }

  function nextPhoto(e) {
    e && e.stopPropagation()
    photoIndex = (photoIndex + 1) % photosActuelles.length
    majPhoto()
  }

  function prevPhoto(e) {
    e && e.stopPropagation()
    photoIndex = (photoIndex - 1 + photosActuelles.length) % photosActuelles.length
    majPhoto()
  }

  function fermerModal(e) {
    if (!e || e.target === document.getElementById('modal') || e.target.classList.contains('modal-close')) {
      document.getElementById('modal').classList.remove('active')
      document.body.style.overflow = ''
    }
  }

  function chargerPlus() {
    pageActuelle++
    afficher()
    window.scrollBy({ top: 400, behavior: 'smooth' })
  }

  function capitalise(str) {
    return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''
  }

  document.getElementById('f-search').addEventListener('keypress', e => {
    if (e.key === 'Enter') appliquerFiltres()
  })

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') fermerModal()
    if (e.key === 'ArrowRight') nextPhoto()
    if (e.key === 'ArrowLeft') prevPhoto()
  })

  chargerAnnonces()
</script>
</body>
</html>
